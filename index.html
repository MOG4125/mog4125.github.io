<script>
const ball = document.getElementById('bouncyBall');
const modal = document.getElementById('modalOverlay');
const btnYes = document.getElementById('btnYes');
const btnNo = document.getElementById('btnNo');
const cornerHello = document.getElementById('cornerHello');
const helloModalOverlay = document.getElementById('helloModalOverlay');
const btnCloseHello = document.getElementById('btnCloseHello');
const helloList = document.getElementById('helloList');

let x = window.innerWidth / 2 - 30;
let y = window.innerHeight / 2 - 30;
let vx = 5;
let vy = 4;
const radius = 30;

let tiltEnabled = false;
let chaosMode = false;

// ---------------- HELLO SYSTEM ----------------
const hellos = [
    { word: 'Hello', lang: 'English' },
    { word: 'Hola', lang: 'Spanish' },
    { word: 'Bonjour', lang: 'French' },
    { word: 'Ciao', lang: 'Italian' },
    { word: 'Hallo', lang: 'German' },
    { word: 'Konnichiwa', lang: 'Japanese' },
    { word: 'Namaste', lang: 'Hindi' },
    { word: 'Salaam', lang: 'Arabic' },
    { word: 'Shalom', lang: 'Hebrew' },
    { word: 'Hej', lang: 'Swedish' }
];

const randomHello = hellos[Math.floor(Math.random() * hellos.length)];
cornerHello.textContent = randomHello.word;

function populateHelloList() {
    helloList.innerHTML = `
        <p style="margin-bottom:1rem;color:#aaa;">
        This is a collection of greetings ("hello") from many different languages around the world.
        </p>
    `;

    hellos.forEach(h => {
        const div = document.createElement('div');
        div.className = 'hello-item';
        div.innerHTML = `<span class="word">${h.word}</span><span class="lang">${h.lang}</span>`;
        helloList.appendChild(div);
    });
}

cornerHello.onclick = () => {
    populateHelloList();
    helloModalOverlay.classList.add('show');
};

btnCloseHello.onclick = () => {
    helloModalOverlay.classList.remove('show');
};

// ---------------- BALL CLICK ----------------
ball.onclick = () => {
    modal.classList.add('show');
};

// ---------------- MODAL EXTENSION ----------------
const controlPanel = document.createElement('div');
controlPanel.innerHTML = `
    <div style="margin-top:1rem">
        <button id="tiltToggle" class="btn btn-secondary">Toggle Tilt Control</button>
        <button id="chaosToggle" class="btn btn-secondary">Toggle Chaos Mode</button>
    </div>
`;
modal.querySelector('.modal').appendChild(controlPanel);

document.getElementById('tiltToggle').onclick = () => {
    tiltEnabled = !tiltEnabled;
};

document.getElementById('chaosToggle').onclick = () => {
    chaosMode = !chaosMode;
};

// ---------------- GITHUB BUTTON ----------------
btnYes.onclick = () => {
    window.open('https://github.com/', '_blank');
};
btnNo.onclick = () => {
    modal.classList.remove('show');
};

// ---------------- TILT ----------------
let tiltX = 0;
let tiltY = 0;

window.addEventListener('deviceorientation', (e) => {
    tiltX = (e.gamma || 0) / 10;
    tiltY = (e.beta || 0) / 10;
});

// ---------------- ANIMATION ----------------
function animate() {
    if (tiltEnabled) {
        vx += tiltX * 0.2;
        vy += tiltY * 0.2;
    }

    if (chaosMode && Math.random() < 0.1) {
        vx += (Math.random() - 0.5) * 10;
        vy += (Math.random() - 0.5) * 10;
    }

    x += vx;
    y += vy;

    if (x <= 0 || x >= window.innerWidth - 60) vx *= -1;
    if (y <= 0 || y >= window.innerHeight - 60) vy *= -1;

    ball.style.left = x + 'px';
    ball.style.top = y + 'px';

    requestAnimationFrame(animate);
}

animate();
</script>
