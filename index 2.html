<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOG — I Make Stuff</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            color: #f5f5f5;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: default;
        }
        .content {
            text-align: center;
            z-index: 10;
            pointer-events: none;
        }
        .content h1 {
            font-size: clamp(2.5rem, 8vw, 6rem);
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1.1;
            margin-bottom: 0.2em;
        }
        .content .subtitle {
            font-size: clamp(1rem, 3vw, 1.8rem);
            font-weight: 300;
            color: #888;
            letter-spacing: 0.05em;
        }
        .typing-hint {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.9rem;
            color: #555;
            font-family: 'Courier New', monospace;
            letter-spacing: 0.1em;
            z-index: 10;
            pointer-events: none;
        }
        .typing-hint .cursor {
            display: inline-block;
            width: 2px;
            height: 1em;
            background: #ff8c00;
            margin-left: 2px;
            animation: blink 1s step-end infinite;
            vertical-align: text-bottom;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        .ball {
            position: absolute;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #ffb347, #ff8c00, #cc5500);
            box-shadow: 0 0 20px rgba(255, 140, 0, 0.4), inset -5px -5px 15px rgba(0,0,0,0.2);
            cursor: pointer;
            z-index: 100;
            transition: transform 0.1s;
            pointer-events: auto;
        }
        .ball:active {
            transform: scale(0.92);
        }
        .ball::after {
            content: '';
            position: absolute;
            top: 12%;
            left: 18%;
            width: 22%;
            height: 14%;
            border-radius: 50%;
            background: rgba(255,255,255,0.35);
            filter: blur(1px);
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.show {
            display: flex;
            opacity: 1;
        }
        .modal {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 16px;
            padding: 2rem 2.5rem;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }
        .modal-overlay.show .modal {
            transform: scale(1);
        }
        .modal h2 {
            font-size: 1.5rem;
            margin-bottom: 0.8rem;
            color: #f5f5f5;
        }
        .modal p {
            color: #aaa;
            margin-bottom: 1.5rem;
            font-size: 1rem;
        }
        .modal-buttons {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
        }
        .btn {
            padding: 0.6rem 1.4rem;
            border-radius: 8px;
            border: none;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #ff8c00;
            color: #0a0a0a;
        }
        .btn-primary:hover {
            background: #ffb347;
        }
        .btn-secondary {
            background: #2a2a2a;
            color: #f5f5f5;
            border: 1px solid #444;
        }
        .btn-secondary:hover {
            background: #333;
        }
    </style>
</head>
<body>
    <div class="content">
        <h1>Hi, I'm MOG</h1>
        <p class="subtitle">I Make Stuff</p>
    </div>

    <div class="typing-hint" id="typingHint"></div>

    <div class="ball" id="bouncyBall"></div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2>Want to check out my GitHub?</h2>
            <p>I've got some cool projects over there.</p>
            <div class="modal-buttons">
                <button class="btn btn-primary" id="btnYes">Take me there</button>
                <button class="btn btn-secondary" id="btnNo">Not now</button>
            </div>
        </div>
    </div>

    <script>
        const ball = document.getElementById('bouncyBall');
        const modal = document.getElementById('modalOverlay');
        const btnYes = document.getElementById('btnYes');
        const btnNo = document.getElementById('btnNo');
        const typingHint = document.getElementById('typingHint');

        let x = window.innerWidth / 2 - 30;
        let y = window.innerHeight / 2 - 30;
        let vx = (Math.random() - 0.5) * 8 + (Math.random() > 0.5 ? 3 : -3);
        let vy = (Math.random() - 0.5) * 8 + (Math.random() > 0.5 ? 3 : -3);
        const radius = 30;
        let isPaused = false;

        // Typing animation
        const hintText = 'click on the ball';
        let hintIndex = 0;
        let hintTyping = true;
        let hintPause = 0;

        function typeHint() {
            if (hintTyping) {
                if (hintIndex < hintText.length) {
                    typingHint.innerHTML = hintText.substring(0, hintIndex + 1) + '<span class="cursor"></span>';
                    hintIndex++;
                    setTimeout(typeHint, 100 + Math.random() * 80);
                } else {
                    hintTyping = false;
                    hintPause = 0;
                    setTimeout(typeHint, 2000);
                }
            } else {
                // Backspace
                if (hintIndex > 0) {
                    typingHint.innerHTML = hintText.substring(0, hintIndex - 1) + '<span class="cursor"></span>';
                    hintIndex--;
                    setTimeout(typeHint, 60);
                } else {
                    hintTyping = true;
                    setTimeout(typeHint, 500);
                }
            }
        }
        typeHint();

        function animate() {
            if (!isPaused) {
                x += vx;
                y += vy;

                if (x <= 0) {
                    x = 0;
                    vx = Math.abs(vx) * (0.8 + Math.random() * 0.6);
                }
                if (x >= window.innerWidth - radius * 2) {
                    x = window.innerWidth - radius * 2;
                    vx = -Math.abs(vx) * (0.8 + Math.random() * 0.6);
                }
                if (y <= 0) {
                    y = 0;
                    vy = Math.abs(vy) * (0.8 + Math.random() * 0.6);
                }
                if (y >= window.innerHeight - radius * 2) {
                    y = window.innerHeight - radius * 2;
                    vy = -Math.abs(vy) * (0.8 + Math.random() * 0.6);
                }

                // Random direction changes for erratic bouncing
                if (Math.random() < 0.015) {
                    vx += (Math.random() - 0.5) * 4;
                    vy += (Math.random() - 0.5) * 4;
                }

                // Clamp speed
                const speed = Math.sqrt(vx*vx + vy*vy);
                const maxSpeed = 12;
                const minSpeed = 3;
                if (speed > maxSpeed) {
                    vx = (vx / speed) * maxSpeed;
                    vy = (vy / speed) * maxSpeed;
                }
                if (speed < minSpeed) {
                    vx = (vx / speed || 1) * minSpeed;
                    vy = (vy / speed || 1) * minSpeed;
                }

                ball.style.left = x + 'px';
                ball.style.top = y + 'px';
            }
            requestAnimationFrame(animate);
        }

        ball.addEventListener('click', () => {
            isPaused = true;
            modal.classList.add('show');
        });

        btnYes.addEventListener('click', () => {
            window.open('https://github.com/MOG4125', '_blank');
            modal.classList.remove('show');
            isPaused = false;
        });

        btnNo.addEventListener('click', () => {
            modal.classList.remove('show');
            isPaused = false;
        });

        window.addEventListener('resize', () => {
            if (x > window.innerWidth - radius * 2) x = window.innerWidth - radius * 2;
            if (y > window.innerHeight - radius * 2) y = window.innerHeight - radius * 2;
        });

        animate();
    </script>
</body>
</html>
